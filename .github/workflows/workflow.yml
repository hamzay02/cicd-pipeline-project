name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting CI pipeline"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          pip install flake8
          pip install nose

      - name: Lint with flake8
        run: flake8 .

      - name: Run unit tests with nose
        run: nosetests

      - name: Complete job
        run: echo "CI pipeline completed"
